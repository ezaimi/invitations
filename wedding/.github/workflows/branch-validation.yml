name: Branch Validation

on:
  push:
    branches:
      - testing
      - main
  pull_request:
    branches:
      - testing
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: branch-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
